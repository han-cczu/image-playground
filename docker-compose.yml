# image-playground 全栈部署。
# 四个服务，按 profile 启停：
#   app        - nginx:alpine 托管 vite 构建产物（无 profile，所有模式都启）
#   cors-proxy - nginx:alpine 反代到上游图像 API（无 profile，所有模式都启）
#   caddy      - 外层反代 + 自动 HTTPS（Let's Encrypt） —— 仅在 --profile https 下启
#   caddy-lan  - HTTP + IP 直连模式的 Caddy（监听 :80，无 HTTPS） —— 仅在 --profile lan 下启
#
# 两种部署模式：
#   ▸ HTTPS（推荐，有域名）:
#       1) 把 Caddyfile 里的 your-domain.com / cors.your-domain.com 改成你的真实域名
#       2)（可选）改 cors-proxy.conf 里的 $upstream
#       3) docker compose --profile https up -d --build
#       4) 访问 https://your-domain.com
#
#   ▸ HTTP + IP（LAN / 临时 / 无域名）:
#       1) docker compose --profile lan up -d --build
#       2) 访问 http://<服务器 IP>
#       注意：浏览器在 http+IP 下会禁用 PWA / Service Worker / 剪贴板写入等能力。
#       项目代码会在页面顶部显示一行 banner 明确提示。
#
# 进阶：HTTPS over IP（sslip.io）—— 见 README「Docker 部署」节。
#
# 注意：app 与 cors-proxy 都不直接对外暴露端口，外网访问只走 caddy / caddy-lan。
# 默认 docker compose up -d（不带 profile）不会启动任何 caddy，必须显式 --profile https 或 --profile lan。

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # CACHE_NAME 注入 commit hash(构建上下文无 .git):
        # GIT_COMMIT=$(git rev-parse --short HEAD) docker compose up -d --build
        # 不传则退化为 nogit-<timestamp>(缓存轮换仍正常,仅失去版本对应)
        GIT_COMMIT: ${GIT_COMMIT:-}
    image: image-playground:latest
    container_name: image-playground-app
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - internal
    # 容器内健康检查（与 nginx.conf 的 /healthz 对齐）
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  cors-proxy:
    image: nginx:alpine
    container_name: image-playground-cors-proxy
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./cors-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - internal
    # 改 upstream 后：docker compose restart cors-proxy

  caddy:
    image: caddy:2-alpine
    container_name: image-playground-caddy
    restart: unless-stopped
    profiles: ["https"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal
    depends_on:
      - app
      - cors-proxy

  caddy-lan:
    image: caddy:2-alpine
    container_name: image-playground-caddy-lan
    restart: unless-stopped
    profiles: ["lan"]
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile.lan:/etc/caddy/Caddyfile:ro
      - caddy_lan_data:/data
      - caddy_lan_config:/config
    networks:
      - internal
    depends_on:
      - app
      - cors-proxy

networks:
  internal:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  caddy_lan_data:
  caddy_lan_config:
