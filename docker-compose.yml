# image-playground 全栈部署。
# 三个服务：
#   app        - nginx:alpine 托管 vite 构建产物
#   cors-proxy - nginx:alpine 反代到上游图像 API（OpenAI / Gemini / 自定义）
#   caddy      - 外层反代 + 自动 HTTPS（Let's Encrypt）
#
# 使用步骤：
#   1) 把 Caddyfile 里的 your-domain.com / cors.your-domain.com 改成你的真实域名
#   2)（可选）改 cors-proxy.conf 里的 $upstream 指向你需要代理的 API
#   3) docker compose up -d --build
#
# 注意：app 与 cors-proxy 都不直接对外暴露端口，外网访问只走 caddy（80 / 443）。

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: image-playground:latest
    container_name: image-playground-app
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - internal
    # 容器内健康检查（与 nginx.conf 的 /healthz 对齐）
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  cors-proxy:
    image: nginx:alpine
    container_name: image-playground-cors-proxy
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./cors-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - internal
    # 改 upstream 后：docker compose restart cors-proxy

  caddy:
    image: caddy:2-alpine
    container_name: image-playground-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal
    depends_on:
      - app
      - cors-proxy

networks:
  internal:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
