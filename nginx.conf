# image-playground 静态托管配置。
# 关键不变量（service worker / 缓存 kill-switch 契约）：
#  1. /sw.js 绝对不能被 HTTP 缓存——否则 kill-switch 部署后旧浏览器拿不到新 SW，逃生通道失效。
#  2. /assets/* 走 hashed 文件名，必须长缓存 + immutable。
#  3. index.html 与 PWA manifest 走短缓存或不缓存，确保新部署能立即生效。
#  4. 所有未命中真实文件的路径 fallback 到 /index.html（SPA 客户端路由）。

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 关闭 nginx 版本号外露
    server_tokens off;

    # 安全响应头基线(详见 docs/security-headers.md)。
    # nginx 的 add_header 不向「含自身 add_header 的子 location」继承,故下方每个这类 location 也各自 include 一次。
    include /etc/nginx/conf.d/security-headers.inc;

    # gzip：vite 产物压缩比可观（530KB -> ~158KB）
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/wasm
        application/manifest+json
        image/svg+xml;

    # ---- Service Worker：绝不缓存 ----
    # 见 spec 契约 3：kill-switch 依赖浏览器每次都从网络拿最新 sw.js。
    # 同时禁用 etag / last-modified 协商缓存，避免 304 复用旧 SW。
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        include /etc/nginx/conf.d/security-headers.inc;
        etag off;
        if_modified_since off;
        try_files $uri =404;
    }

    # ---- Vite 哈希资源：永久缓存 ----
    location /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        include /etc/nginx/conf.d/security-headers.inc;
        try_files $uri =404;
    }

    # ---- PWA manifest：短缓存 ----
    location = /manifest.webmanifest {
        add_header Cache-Control "public, max-age=3600" always;
        include /etc/nginx/conf.d/security-headers.inc;
        types { } default_type "application/manifest+json";
        try_files $uri =404;
    }

    # ---- PWA 图标：中等缓存 ----
    location = /pwa-icon.svg {
        add_header Cache-Control "public, max-age=86400" always;
        include /etc/nginx/conf.d/security-headers.inc;
        try_files $uri =404;
    }

    # ---- index.html：不长缓存，确保新部署立即生效 ----
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate" always;
        include /etc/nginx/conf.d/security-headers.inc;
        try_files $uri =404;
    }

    # ---- SPA fallback：其余路径都回 index.html ----
    # 用命名 location @spa + `rewrite ... last` 触发内部重定向，让请求最终命中
    # `location = /index.html`，从而复用上面定义的 no-cache 响应头；
    # 已存在的静态文件则在本 location 内由 try_files 第一段直接返回，不会被 no-cache 污染。
    location / {
        try_files $uri $uri/ @spa;
    }

    location @spa {
        rewrite ^.*$ /index.html last;
    }

    # 健康检查端点（compose / k8s liveness 可选用）
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
