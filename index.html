<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#111827" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Image Playground" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./pwa-icon.svg" />
    <link rel="icon" href="./pwa-icon.svg" type="image/svg+xml" />
    <title>Image Playground</title>
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('gpt-image-playground');
          var theme = 'light';
          if (raw) {
            var parsed = JSON.parse(raw);
            var stored = parsed && parsed.state && parsed.state.settings && parsed.state.settings.theme;
            if (stored === 'light' || stored === 'dark' || stored === 'system') theme = stored;
          }
          var isDark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (isDark) document.documentElement.classList.add('dark');
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', isDark ? '#09090b' : '#ffffff');
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-gray-50 text-gray-900 dark:bg-gray-950 dark:text-gray-100 min-h-screen">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
