# CORS 代理：把浏览器请求转发到上游图像 / 文本 API，并补上跨域响应头。
# 用法：把 $upstream 改成你要代理的 API origin，然后 `docker compose restart cors-proxy` 即可。
# 在 image-playground 的 SettingsModal 里，把「API 地址」填成：
#   https://cors.your-domain.com/v1            （OpenAI 兼容路径，Images / Responses）
#   https://cors.your-domain.com/v1beta        （Gemini）
# 浏览器会把整条 path（含 /v1/... 或 /v1beta/...）交给本代理，proxy_pass 会带 $request_uri 过去。

resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;
resolver_timeout 5s;

# CORS 来源白名单:未列出的 Origin 得到空 $cors_allow_origin -> 不下发 Access-Control-Allow-Origin,
# 浏览器自然拒绝跨域。把下面改成你自己的站点 origin(可多行)。
# 这样关闭了「任意第三方站点借本代理调用你配置的上游 / 你的 key」的开放代理滥用面。
map $http_origin $cors_allow_origin {
    default "";
    "https://your-domain.com" $http_origin;
    "~^https://([a-z0-9-]+\.)?your-domain\.com$" $http_origin;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    server_tokens off;

    # ---- 在这里选择上游 ----
    # 默认：OpenAI 官方
    set $upstream         "https://api.openai.com";
    set $upstream_host    "api.openai.com";

    # 切换 Gemini：注释上面两行，改用：
    # set $upstream       "https://generativelanguage.googleapis.com";
    # set $upstream_host  "generativelanguage.googleapis.com";

    # 切换自定义网关：
    # set $upstream       "https://your-api-endpoint.example.com";
    # set $upstream_host  "your-api-endpoint.example.com";

    # 关闭客户端上传体积限制（大图 base64 / 遮罩 PNG 可能数 MB）
    client_max_body_size 50m;

    # 流式响应(Responses / chat completions stream)需逐块 flush;代理层 gzip 会缓冲分块、破坏增量输出,
    # 且对上游已压缩响应是双重压缩。上游本身支持压缩,故代理层关闭 gzip。
    gzip off;

    location / {
        # ---- CORS 预检 ----
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "$cors_allow_origin" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, x-goog-api-key, x-api-key, x-goog-user-project" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            add_header Content-Type "text/plain";
            return 204;
        }

        # ---- 转发 ----
        proxy_pass         $upstream$request_uri;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_protocols   TLSv1.2 TLSv1.3;
        proxy_set_header   Host              $upstream_host;
        proxy_set_header   Authorization     $http_authorization;
        # Gemini 用 x-goog-api-key / x-goog-user-project 鉴权，透传
        proxy_set_header   x-goog-api-key       $http_x_goog_api_key;
        proxy_set_header   x-goog-user-project  $http_x_goog_user_project;
        # 通用 x-api-key 头
        proxy_set_header   x-api-key         $http_x_api_key;
        proxy_set_header   Accept            $http_accept;
        proxy_set_header   Content-Type      $http_content_type;

        # 长超时：图像生成可能很久
        proxy_connect_timeout 30s;
        proxy_send_timeout    600s;
        proxy_read_timeout    600s;

        # 流式响应支持（Responses API stream / chat completions stream）
        proxy_buffering    off;
        proxy_request_buffering off;
        proxy_cache        off;

        # ---- 给响应补 CORS 头（即便上游已带也覆盖，避免重复或缺失）----
        # 注意：如果上游同时返回 Access-Control-Allow-Origin，nginx 的 `add_header always`
        # 不会去重，浏览器看到两个值就直接报错。这里使用 hide + add 的稳妥写法。
        proxy_hide_header  Access-Control-Allow-Origin;
        proxy_hide_header  Access-Control-Allow-Methods;
        proxy_hide_header  Access-Control-Allow-Headers;
        proxy_hide_header  Access-Control-Allow-Credentials;
        add_header Access-Control-Allow-Origin      "$cors_allow_origin" always;
        add_header Access-Control-Allow-Methods     "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers     "Authorization, Content-Type, X-Requested-With, x-goog-api-key, x-api-key, x-goog-user-project" always;
        add_header Vary "Origin" always;
    }

    # 健康检查
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
